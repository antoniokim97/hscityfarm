<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화성시 도시농업관리사 협회</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 및 ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel CDN (JSX 컴파일용) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    :root {
      --color-earth-dark: #2A2421; 
      --color-earth-mid: #4A4036;
      --color-earth-light: #8C7A6B;
      --color-sand: #FFFFFF;
      --color-sand-dark: #F4F1ED;
      
      --color-grass-dark: #1E5C3A;
      --color-grass-base: #2E8B57; 
      --color-grass-light: #52B778;
      --color-grass-pale: #D9EAD3;
      
      --color-accent: #E8A844; 
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--color-sand);
      color: var(--color-earth-mid);
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
      overflow-x: hidden;
      cursor: default;
    }

    html { scroll-behavior: smooth; }

    /* 스크롤 Reveal & Stagger 애니메이션 */
    .reveal-target {
      opacity: 0;
      transform: translateY(40px) scale(0.98);
      transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal-target.active {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .delay-100 { transition-delay: 100ms; }
    .delay-200 { transition-delay: 200ms; }
    .delay-300 { transition-delay: 300ms; }
    .delay-400 { transition-delay: 400ms; }
    .delay-500 { transition-delay: 500ms; }
    .delay-600 { transition-delay: 600ms; }

    /* 플로팅 애니메이션 (둥둥 떠다니는 효과) */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: float 4s ease-in-out infinite;
    }

    /* 유체 그레이디언트 배경 애니메이션 (Fluid Background) */
    @keyframes fluid {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .bg-fluid {
      background: linear-gradient(-45deg, #1E5C3A, #2E8B57, #52B778, #E8A844);
      background-size: 400% 400%;
      animation: fluid 15s ease infinite;
    }

    /* 하이엔드 글래스 버튼 */
    .btn-premium {
      background: linear-gradient(135deg, var(--color-grass-light), var(--color-grass-base));
      color: white;
      box-shadow: 0 10px 25px -5px rgba(46, 139, 87, 0.4);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-premium:hover {
      background: linear-gradient(135deg, var(--color-grass-base), var(--color-grass-dark));
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 15px 35px -5px rgba(46, 139, 87, 0.6);
    }

    /* 모달 애니메이션 */
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-animate {
      animation: modalFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* 도트 패턴 배경 */
    .pattern-dots {
      background-image: radial-gradient(rgba(46, 139, 87, 0.15) 2px, transparent 2px);
      background-size: 24px 24px;
    }
    
    /* 로딩 스피너 애니메이션 */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin 1.5s linear infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // Lucide 아이콘 브라우저 래퍼 컴포넌트 생성
    const LucideIcon = ({ name, size = 24, className = "" }) => {
      const iconRef = useRef(null);

      useEffect(() => {
        if (iconRef.current && window.lucide) {
          iconRef.current.innerHTML = ''; // 기존 콘텐츠 초기화
          const iconElement = document.createElement('i');
          iconElement.setAttribute('data-lucide', name);
          if (size) {
            iconElement.style.width = `${size}px`;
            iconElement.style.height = `${size}px`;
          }
          iconRef.current.appendChild(iconElement);
          window.lucide.createIcons({
            attrs: {
              class: className
            },
            nameAttr: 'data-lucide'
          });
        }
      }, [name, size, className]);

      return <span ref={iconRef} className="inline-flex items-center justify-center" style={{ width: size, height: size }} />;
    };

    // 네이버 공식 로고 SVG 컴포넌트
    const NaverIcon = ({ size = 24, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}>
        <path d="M16.273 12.845 7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727v12.845z"/>
      </svg>
    );

    // --- 1. 부드러운 아우라 커서 (Custom Cursor) ---
    const CustomCursor = () => {
      const cursorRef = useRef(null);
      const [isHovering, setIsHovering] = useState(false);

      useEffect(() => {
        const moveCursor = (e) => {
          if (cursorRef.current) {
            cursorRef.current.style.transform = `translate3d(${e.clientX - 20}px, ${e.clientY - 20}px, 0)`;
          }
        };

        const handleMouseOver = (e) => {
          if (e.target.tagName.toLowerCase() === 'a' || e.target.tagName.toLowerCase() === 'button' || e.target.closest('button') || e.target.closest('a')) {
            setIsHovering(true);
          } else {
            setIsHovering(false);
          }
        };

        window.addEventListener('mousemove', moveCursor);
        window.addEventListener('mouseover', handleMouseOver);

        return () => {
          window.removeEventListener('mousemove', moveCursor);
          window.removeEventListener('mouseover', handleMouseOver);
        };
      }, []);

      return (
        <div 
          ref={cursorRef}
          className="fixed top-0 left-0 w-10 h-10 rounded-full pointer-events-none z-[9999] transition-all duration-200 ease-out mix-blend-difference hidden md:flex items-center justify-center"
          style={{ 'willChange': 'transform' }}
        >
          <div className={`w-full h-full bg-[#52B778] rounded-full blur-[8px] transition-all duration-300 ${isHovering ? 'scale-150 opacity-80' : 'scale-50 opacity-40'}`}></div>
        </div>
      );
    };

    // --- 2. 스크롤 프로그레스 바 ---
    const ScrollProgress = () => {
      const [scrollProgress, setScrollProgress] = useState(0);

      useEffect(() => {
        const handleScroll = () => {
          const totalScroll = document.documentElement.scrollTop;
          const windowHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
          const scroll = windowHeight > 0 ? totalScroll / windowHeight : 0;
          setScrollProgress(scroll);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <div className="fixed top-0 left-0 w-full h-[3px] bg-transparent z-[100] pointer-events-none">
          <div 
            className="h-full bg-gradient-to-r from-[#2E8B57] to-[#E8A844]"
            style={{ width: `${scrollProgress * 100}%`, transition: 'width 0.1s ease-out' }}
          ></div>
        </div>
      );
    };

    // --- 3. 3D 입체 틸트 카드 (Tilt Card) ---
    const TiltCard = ({ children, className, delay = 0 }) => {
      const cardRef = useRef(null);
      const [style, setStyle] = useState({ transition: 'transform 0.5s ease-out' });

      const handleMouseMove = useCallback((e) => {
        if (!cardRef.current) return;
        const rect = cardRef.current.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        const rotateX = ((y - centerY) / centerY) * -8;
        const rotateY = ((x - centerX) / centerX) * 8;

        setStyle({
          transform: `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`,
          transition: 'transform 0.1s ease-out'
        });
      }, []);

      const handleMouseLeave = useCallback(() => {
        setStyle({
          transform: 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)',
          transition: 'transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)'
        });
      }, []);

      return (
        <div 
          ref={cardRef}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          style={style}
          className={`reveal-target delay-${delay} ${className} will-change-transform`}
        >
          {children}
        </div>
      );
    };

    // --- 자연 친화적인 프리미엄 캔버스 (반딧불이 & 꽃가루 효과) ---
    const OrganicNatureCanvas = () => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        let particlesArray = [];
        let mouse = { x: null, y: null, radius: 250 };

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          init();
        };

        window.addEventListener('resize', resize);
        
        const handleMouseMove = (e) => {
          mouse.x = e.x;
          mouse.y = e.y;
        };

        const handleMouseOut = () => {
          mouse.x = null;
          mouse.y = null;
        };

        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseout', handleMouseOut);

        class Pollen {
          constructor() {
            this.size = (Math.random() * 4) + 1.5;
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() * 0.5) - 0.25;
            this.vy = (Math.random() * -1.2) - 0.3;
            
            this.angle = Math.random() * Math.PI * 2;
            this.angleSpeed = (Math.random() * 0.03) + 0.01;
            this.depth = Math.random();
            
            const colors = [
              'rgba(144, 238, 144, 0.9)',
              'rgba(255, 215, 0, 0.8)',  
              'rgba(255, 255, 255, 0.9)',
              'rgba(82, 183, 120, 0.7)'  
            ];
            this.color = colors[Math.floor(Math.random() * colors.length)];
          }

          draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * (this.depth + 0.5), 0, Math.PI * 2);
            ctx.shadowBlur = 18 * this.depth;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.shadowBlur = 0;
          }

          update() {
            this.angle += this.angleSpeed;
            this.x += Math.sin(this.angle) * 0.6 * this.depth; 
            
            this.x += this.vx * this.depth;
            this.y += this.vy * this.depth;

            if (this.y < -10) this.y = canvas.height + 10;
            if (this.x < -10) this.x = canvas.width + 10;
            if (this.x > canvas.width + 10) this.x = -10;

            if (mouse.x != null && mouse.y != null) {
              let dx = mouse.x - this.x;
              let dy = mouse.y - this.y;
              let distance = Math.sqrt(dx * dx + dy * dy);
              
              if (distance < mouse.radius) {
                let force = (mouse.radius - distance) / mouse.radius;
                this.vx -= (dx / distance) * force * 0.1 * this.depth;
                this.vy -= (dy / distance) * force * 0.1 * this.depth;
              }
            }

            this.vx *= 0.98;
            this.vy *= 0.98;
            
            if (this.vy > -0.4) this.vy -= 0.01;

            this.draw();
          }
        }

        const init = () => {
          particlesArray = [];
          let numberOfParticles = (canvas.width * canvas.height) / 6000;
          for (let i = 0; i < numberOfParticles; i++) {
            particlesArray.push(new Pollen());
          }
        };

        const animate = () => {
          animationFrameId = requestAnimationFrame(animate);
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (let i = 0; i < particlesArray.length; i++) {
            particlesArray[i].update();
          }
        };

        resize();
        animate();

        return () => {
          window.removeEventListener('resize', resize);
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseout', handleMouseOut);
          cancelAnimationFrame(animationFrameId);
        };
      }, []);

      return <canvas ref={canvasRef} className="absolute inset-0 z-0 pointer-events-auto" />;
    };

    function App() {
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [isScrolled, setIsScrolled] = useState(false);
      const [formData, setFormData] = useState({ name: '', phone: '', message: '' });
      const [isSending, setIsSending] = useState(false);
      const [isSubmitted, setIsSubmitted] = useState(false);
      
      const [agreed, setAgreed] = useState(false);
      const [formError, setFormError] = useState("");
      const [activeModal, setActiveModal] = useState(null);
      
      useEffect(() => {
        const handleScroll = () => {
          setIsScrolled(window.scrollY > 30);
        };
        window.addEventListener('scroll', handleScroll);

        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('active');
            }
          });
        }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

        document.querySelectorAll('.reveal-target').forEach((el) => observer.observe(el));

        return () => {
          window.removeEventListener('scroll', handleScroll);
          observer.disconnect();
        };
      }, []);

      useEffect(() => {
        if (activeModal) document.body.style.overflow = 'hidden';
        else document.body.style.overflow = 'unset';
        return () => { document.body.style.overflow = 'unset'; };
      }, [activeModal]);

      const toggleMenu = () => setIsMenuOpen(!isMenuOpen);
      const handleFormChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
        setFormError(""); 
      };

      const handleEmailSubmit = async (e) => {
        e.preventDefault();

        // 1. 이름 유효성 검사
        if (!formData.name.trim()) {
          setFormError("이름을 정확히 입력해 주세요.");
          return;
        }

        // 2. 전화번호 유효성 검사 (정규식: 010-0000-0000 또는 01000000000 형식 지원)
        const phoneRegex = /^01([0|1|6|7|8|9])-?([0-9]{3,4})-?([0-9]{4})$/;
        if (!phoneRegex.test(formData.phone.trim())) {
          setFormError("올바른 연락처 형식을 입력해 주세요. (예: 010-1234-5678)");
          return;
        }

        // 3. 약관 동의 검사
        if (!agreed) {
          setFormError("개인정보 수집 및 이용에 동의해 주세요.");
          return;
        }

        setIsSending(true);
        setFormError("");

        try {
          // --- 가입이나 키 발급이 전혀 필요 없는 FormSubmit 방식 ---
          const response = await fetch("https://formsubmit.co/ajax/jinseokjjj@gmail.com", {
            method: "POST",
            headers: { 
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify({
              "이름": formData.name,
              "연락처": formData.phone,
              "남기실_말씀": formData.message || "없음",
              "_subject": `[가입신청서] ${formData.name}님의 신청이 도착했습니다.`
            })
          });

          if (response.ok) {
            // 성공 처리: 성공 애니메이션과 함께 폼 초기화
            setIsSending(false);
            setIsSubmitted(true);
            
            setTimeout(() => {
              setIsSubmitted(false);
              setFormData({ name: '', phone: '', message: '' });
              setAgreed(false);
            }, 3000);
          } else {
            throw new Error("서버 응답 오류");
          }

        } catch (error) {
          console.error("FAILED...", error);
          setIsSending(false);
          setFormError("전송에 실패했습니다. (첫 발송인 경우 메일함으로 온 'Activate' 메일을 클릭해 승인해 주셔야 합니다.)");
        }
      };

      return (
        <div className="min-h-screen">
          <ScrollProgress />
          <CustomCursor />

          {/* 네비게이션 바 */}
          <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/95 backdrop-blur-md shadow-sm py-4 border-b border-[#F4F1ED]' : 'bg-transparent py-6'}`}>
            <div className="max-w-7xl mx-auto px-6 lg:px-8">
              <div className="flex justify-between items-center h-12">
                <div className="flex items-center gap-3 cursor-pointer group" onClick={() => window.scrollTo(0,0)}>
                  <div className="w-11 h-11 rounded-xl bg-[#2E8B57] flex items-center justify-center text-white shadow-lg group-hover:bg-[#1E5C3A] group-hover:scale-105 group-hover:rotate-6 transition-all duration-300">
                    <LucideIcon name="leaf" size={22} className="stroke-[2.5]" />
                  </div>
                  <span className={`font-extrabold text-xl tracking-tight transition-colors duration-300 ${isScrolled ? 'text-[#2A2421]' : 'text-white drop-shadow-md'}`}>
                    화성시 도시농업관리사 협회
                  </span>
                </div>
                
                <div className="hidden md:flex space-x-10 text-[16px] font-bold">
                  {['협회 소개', '주요 활동', '가입 신청', '오시는 길'].map((item, idx) => (
                    <a 
                      key={idx} 
                      href={`#${['about', 'activities', 'membership', 'contact'][idx]}`} 
                      className={`relative transition-colors hover:text-[#E8A844] ${isScrolled ? 'text-[#4A4036]' : 'text-white drop-shadow-md'} after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-0 after:h-[3px] after:rounded-full after:bg-[#E8A844] after:transition-all hover:after:w-full`}
                    >
                      {item}
                    </a>
                  ))}
                </div>

                <div className="md:hidden">
                  <button onClick={toggleMenu} className={isScrolled ? 'text-[#2A2421]' : 'text-white'}>
                    {isMenuOpen ? <LucideIcon name="x" size={30} /> : <LucideIcon name="menu" size={30} />}
                  </button>
                </div>
              </div>
            </div>

            {/* 모바일 메뉴 */}
            <div className={`md:hidden absolute top-full left-0 w-full bg-white shadow-2xl transition-all duration-500 overflow-hidden ${isMenuOpen ? 'max-h-96 border-t border-[#F4F1ED]' : 'max-h-0'}`}>
              <div className="px-6 py-4 space-y-1">
                {['협회 소개', '주요 활동', '가입 신청', '오시는 길'].map((item, idx) => (
                  <a 
                    key={idx}
                    href={`#${['about', 'activities', 'membership', 'contact'][idx]}`} 
                    onClick={toggleMenu} 
                    className="block py-4 text-lg font-bold text-[#2A2421] hover:text-[#2E8B57] border-b border-[#F4F1ED] last:border-0"
                  >
                    {item}
                  </a>
                ))}
              </div>
            </div>
          </nav>

          {/* 메인 비주얼 (Hero) */}
          <section className="relative flex items-center min-h-[95vh] overflow-hidden bg-white">
            <div className="absolute inset-0 z-0 pointer-events-none">
              <img 
                src="https://drive.google.com/thumbnail?id=1ARLi5xyFBprDnHSWRFZaiRDYiuCG4RLW&sz=w2500" 
                onError={(e) => {
                  e.target.onerror = null; 
                  e.target.src = "https://images.unsplash.com/photo-1592424001806-5dd9a15abdb9?auto=format&fit=crop&w=2000&q=80";
                }}
                alt="화성시 도시농업관리사 협회 메인 배경" 
                className="w-full h-full object-cover opacity-95 scale-105 transition-transform duration-[20s] ease-out hover:scale-110"
                style={{ filter: 'brightness(0.75) contrast(1.1) saturate(1.15)' }} 
              />
              <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
              <div className="absolute inset-0 bg-gradient-to-r from-[#1E5C3A]/70 to-transparent"></div>
            </div>

            <OrganicNatureCanvas />

            <div className="relative z-10 w-full max-w-7xl mx-auto px-6 lg:px-8 mt-16 pointer-events-none">
              <div className="max-w-3xl reveal-target active pointer-events-auto">
                
                {/* 펄스 애니메이션 배지 */}
                <div className="inline-flex items-center gap-3 py-3 px-7 rounded-full bg-white/10 backdrop-blur-xl border border-white/30 text-white text-[15px] font-bold tracking-wider mb-8 shadow-2xl animate-float">
                  <span className="relative flex h-4 w-4">
                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#39FF14] opacity-80"></span>
                    <span className="relative inline-flex rounded-full h-4 w-4 bg-[#00FF00] shadow-[0_0_12px_#39FF14]"></span>
                  </span>
                  도시농업은 우리의 삶을 풍요롭게 합니다.
                </div>

                <h1 className="text-5xl md:text-6xl lg:text-[5.5rem] font-extrabold text-white leading-[1.15] mb-8 tracking-tight drop-shadow-[0_4px_8px_rgba(0,0,0,0.6)] word-keep">
                  도시에서 가꾸는 행복,<br/>
                  <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#52B778] to-[#FFD700]">
                    함께 만드는 푸른 화성!
                  </span>
                </h1>

                  </div>
                  <p className="text-xl font-medium leading-relaxed max-w-sm text-white/80">
                    함께해요! 도시농업의 희망, 화성의 미래!
                  </p>
                </div>

                <div className="md:col-span-6 md:flex md:justify-end md:items-center">
                  <a href="http://www.hscityfarm.co.kr" target="_blank" rel="noreferrer" className="inline-flex items-center gap-4 hover:text-white transition-colors group">
                    <div className="flex flex-col text-left md:text-right">
                      <span className="text-[#E8A844] font-bold text-sm uppercase tracking-wider mb-1">바로가기</span>
                      <span className="text-2xl md:text-3xl font-extrabold text-white group-hover:text-[#52B778] transition-colors">www.hscityfarm.co.kr</span>
                    </div>
                    <div className="w-16 h-16 rounded-full bg-[#2E8B57] flex items-center justify-center text-white shadow-[0_0_20px_rgba(46,139,87,0.5)] group-hover:scale-110 group-hover:bg-[#52B778] group-hover:shadow-[0_0_30px_rgba(82,183,120,0.8)] transition-all duration-300">
                      <LucideIcon name="arrow-right" size={32} />
                    </div>
                  </a>
                </div>
              </div>

              <div className="flex flex-col md:flex-row justify-between items-center pt-10 border-t border-white/10 text-base font-medium text-white/60 reveal-target delay-200">
                <span className="mb-6 md:mb-0">&copy; 2026 화성시 도시농업관리사 협회. All rights reserved.</span>
                <div className="flex gap-10 items-center">
                  <button onClick={() => setActiveModal('terms')} className="hover:text-white transition-colors text-left relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-[1px] after:bg-white after:transition-all hover:after:w-full">이용약관</button>
                  <button onClick={() => setActiveModal('privacy')} className="hover:text-white transition-colors text-left relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-[1px] after:bg-white after:transition-all hover:after:w-full">개인정보처리방침</button>
                  
                  <div className="flex gap-5 ml-4 pl-8 border-l border-white/10">
                    <a href="https://blog.naver.com/cityfarm2026" target="_blank" rel="noreferrer" className="hover:text-[#03C75A] transition-transform hover:-translate-y-2 hover:scale-110 block">
                      <NaverIcon size={26} />
                    </a>
                    <a href="#" className="hover:text-[#E8A844] transition-transform hover:-translate-y-2 hover:scale-110 block">
                      <LucideIcon name="instagram" size={28} />
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </footer>

          {/* --- 모달 컴포넌트 --- */}
          {activeModal && (
            <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 sm:p-6">
              <div 
                className="absolute inset-0 bg-black/60 backdrop-blur-md transition-opacity" 
                onClick={() => setActiveModal(null)}
              ></div>
              
              <div className="relative bg-white rounded-3xl shadow-2xl w-full max-w-3xl max-h-[85vh] overflow-hidden flex flex-col modal-animate border border-white/20">
                <div className="flex justify-between items-center px-8 py-6 border-b border-gray-100 bg-[#F8F6F4]">
                  <div className="flex items-center gap-3">
                    {activeModal === 'terms' ? <LucideIcon name="file-text" className="text-[#2E8B57]" size={28} /> : <LucideIcon name="shield-check" className="text-[#2E8B57]" size={28} />}
                    <h3 className="text-2xl font-extrabold text-[#2A2421]">
                      {activeModal === 'terms' ? '서비스 이용약관' : '개인정보 처리방침'}
                    </h3>
                  </div>
                  <button onClick={() => setActiveModal(null)} className="text-gray-400 hover:text-gray-900 transition-all bg-white rounded-full p-2 shadow-sm hover:bg-gray-100 hover:rotate-90">
                    <LucideIcon name="x" size={24} />
                  </button>
                </div>
                
                <div className="p-10 overflow-y-auto flex-1 text-[#4A4036] leading-relaxed font-medium">
                  {activeModal === 'terms' ? (
                    <div className="space-y-8">
                      <p className="text-sm text-gray-500 font-bold mb-4 bg-gray-100 inline-block px-3 py-1 rounded-md">시행일자: 2026년 01월 01일</p>
                      <section>
                        <h4 className="text-xl font-bold text-[#2E8B57] mb-3 border-l-4 border-[#2E8B57] pl-3">제1조 (목적)</h4>
                        <p className="text-lg">본 약관은 화성시 도시농업관리사 협회(이하 "협회")가 제공하는 서비스의 이용 조건 및 절차, 회원과 협회의 권리, 의무 및 책임사항 등을 규정함을 목적으로 합니다.</p>
                      </section>
                      <section>
                        <h4 className="text-xl font-bold text-[#2E8B57] mb-3 border-l-4 border-[#2E8B57] pl-3">제2조 (회원의 자격)</h4>
                        <p className="text-lg">① 회원은 본 협회의 설립 목적에 동의하고, '도시농업관리사' 국가 자격증을 소지한 자로 한정합니다.<br/>
                        ② 가입 신청서를 제출하고 협회가 정한 연회비 및 출자금을 납부한 자에 한하여 정식 회원 자격이 부여됩니다.</p>
                      </section>
                      <section>
                        <h4 className="text-xl font-bold text-[#2E8B57] mb-3 border-l-4 border-[#2E8B57] pl-3">제3조 (서비스의 제공)</h4>
                        <p className="text-lg">협회는 회원에게 다음과 같은 서비스를 제공합니다.<br/>
                        1. 도시농업 관련 전문 교육 및 워크샵 제공<br/>
                        2. 지역 사회 공익 활동(봉사, 기부 등) 참여 기회<br/>
                        3. 농업 관련 자재 및 물품의 제휴 할인 서비스<br/>
                        4. 기타 협회의 목적 달성에 부합하는 제반 서비스</p>
                      </section>
                    </div>
                  ) : (
                    <div className="space-y-8">
                      <p className="text-sm text-gray-500 font-bold mb-4 bg-gray-100 inline-block px-3 py-1 rounded-md">시행일자: 2026년 01월 01일</p>
                      <section>
                        <h4 className="text-xl font-bold text-[#2E8B57] mb-3 border-l-4 border-[#2E8B57] pl-3">1. 개인정보의 수집 및 이용 목적</h4>
                        <p className="text-lg">화성시 도시농업관리사 협회는 가입 신청 및 상담, 원활한 의사소통 경로 확보를 위해 아래와 같은 개인정보를 수집하고 있습니다.<br/>
                        - 수집목적 : 회원 가입 의사 확인, 본인 식별, 상담 진행 및 결과 회신</p>
                      </section>
                      <section>
                        <h4 className="text-xl font-bold text-[#2E8B57] mb-3 border-l-4 border-[#2E8B57] pl-3">2. 수집하는 개인정보 항목</h4>
                        <p className="text-lg">협회는 문의 접수 시 아래의 개인정보를 필수로 수집합니다.<br/>
                        - 필수항목 : 이름 (성함), 연락처 (휴대폰 번호)<br/>
                        - 선택항목 : 남기실 말씀 (상담 내용)</p>
                      </section>
                      <section>
                        <h4 className="text-xl font-bold text-[#2E8B57] mb-3 border-l-4 border-[#2E8B57] pl-3">3. 개인정보의 보유 및 이용기간</h4>
                        <p className="text-lg">원칙적으로 개인정보 수집 및 이용 목적이 달성된 후에는 해당 정보를 지체 없이 파기합니다. 단, 관계 법령의 규정에 의하여 보존할 필요가 있는 경우 협회는 일정 기간 동안 개인정보를 보관합니다.<br/>
                        - 보존항목 : 가입 문의 이력<br/>
                        - 보존기간 : 6개월 (상담 완료 시 즉시 파기)</p>
                      </section>
                    </div>
                  )}
                </div>
                
                <div className="px-8 py-5 border-t border-gray-100 bg-white flex justify-end">
                  <button 
                    onClick={() => setActiveModal(null)}
                    className="px-10 py-4 bg-[#2E8B57] hover:bg-[#1E5C3A] text-white font-extrabold rounded-2xl transition-all hover:scale-105 shadow-md hover:shadow-lg focus:ring-4 focus:ring-[#52B778]/50 outline-none"
                  >
                    확인
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
